<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test English Live Chat API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .warning { background: #fff3cd; border-color: #ffeaa7; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .status { font-weight: bold; margin: 10px 0; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test English Live Chat API</h1>
        <p>Test the updated English Live Chat API with vocabulary extraction</p>

        <!-- Test Input -->
        <div class="test-section">
            <h3>Test Input</h3>
            <label>Test Message:</label>
            <input type="text" id="testMessage" value="Hello, I want to practice English conversation. Can you help me?" />
            
            <label>User ID (leave empty for anonymous):</label>
            <input type="text" id="userId" placeholder="anonymous" />
            
            <button onclick="testChat()">Test Chat Action</button>
            <button onclick="testStart()">Test Start Action</button>
        </div>

        <!-- Results -->
        <div class="test-section" id="results">
            <h3>Results</h3>
            <div class="status" id="status">Ready to test</div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : type === 'warning' ? 'orange' : 'black';
            logElement.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function setStatus(message, type = 'info') {
            const statusElement = document.getElementById('status');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'warning';
            statusElement.textContent = message;
            statusElement.parentElement.className = 'test-section ' + className;
        }

        async function testStart() {
            log('Testing start action...', 'info');
            setStatus('Testing start action...', 'warning');

            try {
                const response = await fetch('/api/english-live-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'start',
                        userId: document.getElementById('userId').value || 'anonymous'
                    })
                });

                const result = await response.json();
                log(`Response status: ${response.status}`, 'info');
                log(`Response: ${JSON.stringify(result, null, 2)}`, 'info');

                if (response.ok && result.success) {
                    log('✅ Start action successful', 'success');
                    setStatus('✅ Start action works', 'success');
                } else {
                    log(`❌ Start action failed: ${result.message || 'Unknown error'}`, 'error');
                    setStatus('❌ Start action failed', 'error');
                }
            } catch (error) {
                log(`❌ Start test failed: ${error.message}`, 'error');
                setStatus('❌ Connection error', 'error');
            }
        }

        async function testChat() {
            log('Testing chat action...', 'info');
            setStatus('Testing chat action...', 'warning');

            try {
                const message = document.getElementById('testMessage').value;
                const userId = document.getElementById('userId').value || 'anonymous';

                log(`Sending message: "${message}"`, 'info');
                log(`Using userId: ${userId}`, 'info');

                const response = await fetch('/api/english-live-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'chat',
                        message: message,
                        conversationHistory: [],
                        learnerProfile: {
                            level: 'A2',
                            vietnameseLevel: 'native',
                            learningGoals: ['Daily conversation'],
                            commonMistakes: ['Articles', 'Verb tenses'],
                            interests: ['Music', 'Travel'],
                            conversationCount: 0
                        },
                        config: {
                            enableRecasting: true,
                            enableIPlusOne: true,
                            enableVietnameseSupport: true,
                            speakingSpeed: 'normal',
                            correctionStyle: 'implicit'
                        },
                        userId: userId
                    })
                });

                const result = await response.json();
                log(`Response status: ${response.status}`, 'info');
                log(`Response: ${JSON.stringify(result, null, 2)}`, 'info');

                if (response.ok && result.success) {
                    log('✅ Chat action successful', 'success');
                    log(`📝 AI Response: ${result.response}`, 'success');
                    
                    if (result.vocabulary && result.vocabulary.length > 0) {
                        log(`📚 Vocabulary extracted: ${result.vocabulary.length} items`, 'success');
                        result.vocabulary.forEach((item, i) => {
                            log(`  ${i+1}. ${item.word} (${item.partOfSpeech}) - ${item.meaning}`, 'success');
                            log(`     Example: ${item.example}`, 'info');
                        });
                    } else {
                        log('📚 No vocabulary extracted', 'warning');
                    }

                    if (result.vocabularySaved) {
                        log(`💾 Vocabulary saved: ${result.vocabularySaved.savedCount} saved, ${result.vocabularySaved.failedCount} failed`, 'success');
                    }

                    if (result.grammarAnalysis) {
                        log(`📝 Grammar analysis: ${result.grammarAnalysis.errors?.length || 0} errors found`, 'info');
                    }

                    setStatus('✅ Chat action works with vocabulary extraction', 'success');
                } else {
                    log(`❌ Chat action failed: ${result.message || 'Unknown error'}`, 'error');
                    setStatus('❌ Chat action failed', 'error');
                }
            } catch (error) {
                log(`❌ Chat test failed: ${error.message}`, 'error');
                setStatus('❌ Connection error', 'error');
            }
        }

        // Auto-load with sample data
        window.onload = function() {
            log('English Live Chat API Tester loaded', 'info');
            log('Click "Test Start Action" or "Test Chat Action" to begin', 'info');
        };
    </script>
</body>
</html>
